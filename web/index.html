<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LabNet Publications — members and their work</title>
  <meta name="description" content="Lab members and academic output for LabNet (PESC/COPPE/UFRJ). Refreshed by Claude Code.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "ui-monospace", "monospace"],
          },
          colors: {
            accent: { 400: "#f59e0b", 500: "#d97706", 600: "#b45309" },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="assets/style.css">
  <script defer src="assets/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.10/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased min-h-screen" x-data="pubApp()" x-init="init()" x-cloak>

  <header class="border-b border-zinc-800/80 bg-zinc-950/80 backdrop-blur sticky top-0 z-30">
    <div class="max-w-[1600px] mx-auto px-6 py-4 flex flex-wrap items-center gap-4">
      <a href="./" class="flex items-center gap-3 shrink-0">
        <div class="w-9 h-9 rounded-md bg-accent-500/15 ring-1 ring-accent-500/40 grid place-items-center">
          <span class="font-mono text-accent-400 text-sm font-semibold tracking-tight">lp</span>
        </div>
        <div class="leading-tight">
          <div class="font-semibold tracking-tight" x-text="t('site_name')"></div>
          <div class="text-[11px] uppercase tracking-wider text-zinc-500">PESC · COPPE · UFRJ</div>
        </div>
      </a>

      <div class="grow flex items-center gap-2 max-w-md">
        <input type="search" :placeholder="t('search_placeholder')"
          x-model.debounce.150ms="q"
          class="w-full bg-zinc-900 border border-zinc-800 rounded-md px-3 py-2 text-sm placeholder:text-zinc-600 focus:border-accent-500 focus:ring-2 focus:ring-accent-500/30 outline-none transition">
      </div>

      <nav class="flex items-center gap-1 bg-zinc-900 border border-zinc-800 rounded-md p-0.5">
        <button @click="view='people'" :class="view==='people' ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'" class="px-3 py-1.5 text-xs rounded font-medium transition" x-text="t('nav_people')"></button>
        <button @click="view='publications'" :class="view==='publications' ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'" class="px-3 py-1.5 text-xs rounded font-medium transition" x-text="t('nav_publications')"></button>
        <button @click="view='services'" :class="view==='services' ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'" class="px-3 py-1.5 text-xs rounded font-medium transition" x-text="t('nav_services')"></button>
      </nav>

      <div class="flex items-center gap-1 bg-zinc-900 border border-zinc-800 rounded-md p-0.5">
        <button @click="lang='en'" :class="lang==='en' ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'" class="px-2.5 py-1.5 text-[11px] rounded font-mono uppercase transition">EN</button>
        <button @click="lang='pt'" :class="lang==='pt' ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'" class="px-2.5 py-1.5 text-[11px] rounded font-mono uppercase transition">PT</button>
      </div>
    </div>

    <template x-if="data && data.meta">
      <div :class="data.meta.refresh_overdue ? 'bg-rose-500/10 border-rose-500/30 text-rose-200' : 'bg-zinc-900/60 border-zinc-800 text-zinc-400'"
           class="border-t text-xs px-6 py-2 flex flex-wrap items-center justify-center gap-x-4 gap-y-1">
        <span>
          <span x-text="t('last_refresh')"></span>
          <span class="font-mono text-zinc-200" x-text="data.meta.last_refresh"></span>
          ·
          <span x-text="t('next_due')"></span>
          <span class="font-mono text-zinc-200" x-text="data.meta.next_refresh"></span>
        </span>
        <template x-if="data.meta.refresh_overdue">
          <span class="font-medium">
            <span x-text="t('refresh_overdue')"></span>
            <code class="bg-zinc-900 px-1.5 py-0.5 rounded text-rose-200 font-mono">/refresh-publications</code>
          </span>
        </template>
        <template x-if="!data.meta.refresh_overdue && data.meta.stale_members && data.meta.stale_members.length">
          <span class="text-zinc-500" x-text="'· ' + data.meta.stale_members.length + ' ' + t('stale_members_suffix')"></span>
        </template>
      </div>
    </template>
  </header>

  <main class="max-w-[1600px] mx-auto px-6 py-6">

    <div x-show="error" class="border border-rose-500/30 bg-rose-500/10 rounded-lg p-6 text-rose-200 text-sm">
      Failed to load <code class="font-mono">data/site.json</code>: <span x-text="error"></span>.
      <div class="text-xs text-rose-300/70 mt-2">Run <code class="font-mono bg-zinc-900 px-1 py-0.5 rounded">npm run all</code> to regenerate, then reload.</div>
    </div>

    <!-- ============================== PEOPLE VIEW ============================== -->
    <section x-show="view==='people' && !error">
      <div class="mb-6 flex flex-wrap items-center gap-2">
        <template x-for="r in ['all', 'professor', 'phd_student', 'masters_student', 'undergraduate_researcher', 'alumni']" :key="r">
          <button @click="roleFilter=r"
                  :class="roleFilter===r ? 'bg-accent-500/20 text-accent-400 border-accent-500/40' : 'bg-zinc-900 text-zinc-400 border-zinc-800 hover:border-zinc-700'"
                  class="text-xs px-3 py-1.5 rounded-md border transition">
            <span x-text="t('role_'+r)"></span>
            <span class="ml-1.5 font-mono text-zinc-600" x-text="r==='all' ? data.members.length : data.members.filter(m=>m.role===r || (r==='professor' && m.role.startsWith('professor'))).length"></span>
          </button>
        </template>
        <div class="ml-auto text-xs text-zinc-500">
          <span class="font-mono text-zinc-300" x-text="filteredMembers.length"></span> /
          <span class="font-mono" x-text="data.members.length"></span>
          <span x-text="t('members')"></span>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        <template x-for="m in filteredMembers" :key="m.id">
          <article @click="selectedMember = m" class="group bg-zinc-900/40 hover:bg-zinc-900 border border-zinc-800/80 hover:border-zinc-700 rounded-xl p-5 cursor-pointer transition flex flex-col gap-3">
            <div class="flex items-start gap-3">
              <div class="w-14 h-14 rounded-full bg-zinc-800 ring-2 ring-zinc-800 group-hover:ring-accent-500/30 shrink-0 overflow-hidden grid place-items-center">
                <template x-if="m.photo_url">
                  <img :src="m.photo_url" :alt="m.name" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerHTML = '<span class=\'font-mono text-lg text-zinc-500\'>' + (this.alt || '?').split(' ').map(s=>s[0]).slice(0,2).join('') + '</span>'">
                </template>
                <template x-if="!m.photo_url">
                  <span class="font-mono text-lg text-zinc-500" x-text="m.name.split(' ').map(s=>s[0]).slice(0,2).join('')"></span>
                </template>
              </div>
              <div class="min-w-0">
                <h3 class="font-semibold text-zinc-100 leading-tight group-hover:text-accent-400 transition" x-text="m.name"></h3>
                <div class="text-[11px] uppercase tracking-wider text-zinc-500 mt-1" x-text="t('role_'+m.role)"></div>
                <div class="text-xs text-zinc-500 mt-0.5" x-text="m.affiliation"></div>
              </div>
            </div>

            <p class="text-xs text-zinc-400 leading-relaxed line-clamp-2" x-text="m['bio_'+lang] || m.bio_en || m.bio_pt"></p>

            <div class="flex items-center justify-between pt-3 border-t border-zinc-800/80 mt-auto">
              <div class="flex items-center gap-3 text-[11px] text-zinc-500">
                <template x-if="data.counts.by_member[m.id]?.publications">
                  <span><span class="font-mono text-zinc-300" x-text="data.counts.by_member[m.id].publications"></span> <span x-text="t('pubs_count')"></span></span>
                </template>
                <template x-if="data.counts.by_member[m.id]?.services">
                  <span><span class="font-mono text-zinc-300" x-text="data.counts.by_member[m.id].services"></span> <span x-text="t('svc_count')"></span></span>
                </template>
                <template x-if="!data.counts.by_member[m.id]?.publications && !data.counts.by_member[m.id]?.services">
                  <span class="text-zinc-600 italic" x-text="m.last_research_date ? t('no_records') : t('never_researched')"></span>
                </template>
              </div>
              <div class="flex items-center gap-1.5">
                <template x-if="m.profiles?.scholar_url">
                  <a :href="m.profiles.scholar_url" target="_blank" rel="noopener" @click.stop class="text-zinc-500 hover:text-accent-400 transition" title="Google Scholar"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12 12 0 01.84 4.422c0 2.21-3.582 4-8 4s-8-1.79-8-4a12 12 0 01.84-4.422L12 14z"/></svg></a>
                </template>
                <template x-if="m.profiles?.lattes_url">
                  <a :href="m.profiles.lattes_url" target="_blank" rel="noopener" @click.stop class="text-zinc-500 hover:text-accent-400 transition font-mono text-[11px] font-semibold" title="Lattes">L</a>
                </template>
                <template x-if="m.profiles?.github">
                  <a :href="m.profiles.github" target="_blank" rel="noopener" @click.stop class="text-zinc-500 hover:text-accent-400 transition" title="GitHub"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg></a>
                </template>
                <template x-if="m.profiles?.linkedin">
                  <a :href="m.profiles.linkedin" target="_blank" rel="noopener" @click.stop class="text-zinc-500 hover:text-accent-400 transition" title="LinkedIn"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452z"/></svg></a>
                </template>
              </div>
            </div>
          </article>
        </template>
      </div>
    </section>

    <!-- ============================== PUBLICATIONS VIEW ============================== -->
    <section x-show="view==='publications' && !error">
      <div class="grid grid-cols-1 md:grid-cols-[260px_1fr] gap-6">
        <aside class="space-y-6">
          <section>
            <h3 class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2" x-text="t('filter_year')"></h3>
            <div class="flex flex-wrap gap-1.5">
              <template x-for="y in pubYears" :key="y">
                <button @click="toggleYear(y)"
                        :class="filters.years.includes(y) ? 'bg-accent-500/20 text-accent-400 border-accent-500/40' : 'bg-zinc-900 text-zinc-400 border-zinc-800 hover:border-zinc-700'"
                        class="text-xs px-2 py-0.5 rounded border font-mono transition" x-text="y"></button>
              </template>
            </div>
          </section>

          <section>
            <h3 class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2" x-text="t('filter_type')"></h3>
            <div class="space-y-1">
              <template x-for="t in data.tags.publication_types" :key="t.id">
                <label class="flex items-center gap-2 text-sm cursor-pointer" x-show="data.counts.publications_by_type[t.id]">
                  <input type="checkbox" :value="t.id" x-model="filters.types" class="accent-accent-500">
                  <span class="grow truncate" x-text="t['name_'+lang] || t.name_en"></span>
                  <span class="text-xs font-mono text-zinc-600" x-text="data.counts.publications_by_type[t.id] || 0"></span>
                </label>
              </template>
            </div>
          </section>

          <section>
            <h3 class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2" x-text="t('filter_area')"></h3>
            <div class="space-y-1">
              <template x-for="a in data.tags.areas" :key="a.id">
                <label class="flex items-center gap-2 text-sm cursor-pointer" x-show="data.counts.publications_by_area[a.id]">
                  <input type="checkbox" :value="a.id" x-model="filters.areas" class="accent-accent-500">
                  <span class="grow truncate" x-text="a['name_'+lang] || a.name_en"></span>
                  <span class="text-xs font-mono text-zinc-600" x-text="data.counts.publications_by_area[a.id] || 0"></span>
                </label>
              </template>
            </div>
          </section>

          <section>
            <h3 class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2" x-text="t('filter_author')"></h3>
            <div class="space-y-1 max-h-60 overflow-y-auto pr-1">
              <template x-for="m in data.members" :key="m.id">
                <label class="flex items-center gap-2 text-sm cursor-pointer" x-show="data.counts.by_member[m.id]?.publications">
                  <input type="checkbox" :value="m.id" x-model="filters.authors" class="accent-accent-500">
                  <span class="grow truncate" x-text="m.name"></span>
                  <span class="text-xs font-mono text-zinc-600" x-text="data.counts.by_member[m.id]?.publications || 0"></span>
                </label>
              </template>
            </div>
          </section>

          <button @click="resetFilters()" class="text-xs text-zinc-500 hover:text-zinc-200 transition" x-text="t('clear_filters')"></button>
        </aside>

        <div class="min-w-0">
          <div class="mb-3 text-xs text-zinc-500">
            <span class="text-zinc-300 font-mono" x-text="filteredPublications.length"></span> /
            <span class="font-mono" x-text="data.publications.length"></span>
            <span x-text="t('publications')"></span>
          </div>

          <div x-show="!data.publications.length" class="border border-zinc-800 rounded-lg p-12 text-center text-zinc-500">
            <p x-text="t('no_pubs_yet')"></p>
            <p class="mt-2 text-xs">Run <code class="bg-zinc-950 px-1.5 py-0.5 rounded font-mono">/refresh-publications</code> in Claude Code to populate.</p>
          </div>

          <div x-show="data.publications.length && !filteredPublications.length" class="border border-zinc-800 rounded-lg p-12 text-center text-zinc-500">
            <span x-text="t('no_match')"></span>
          </div>

          <div class="space-y-6">
            <template x-for="group in publicationsByYear" :key="group.year">
              <section>
                <h2 class="text-lg font-semibold text-zinc-200 mb-2 flex items-baseline gap-2">
                  <span x-text="group.year"></span>
                  <span class="text-xs font-mono text-zinc-500" x-text="'(' + group.items.length + ')'"></span>
                </h2>
                <ul class="space-y-2">
                  <template x-for="p in group.items" :key="p.id">
                    <li @click="selectedPub = p" class="bg-zinc-900/30 hover:bg-zinc-900/60 border border-zinc-800/80 hover:border-zinc-700 rounded-lg p-4 cursor-pointer transition">
                      <div class="flex items-start justify-between gap-4">
                        <div class="min-w-0">
                          <h3 class="font-medium text-zinc-100 leading-snug" x-text="p['title_'+lang] || p.title"></h3>
                          <div class="text-xs text-zinc-400 mt-1" x-text="(p.authors || []).map(a => a.name).join(', ')"></div>
                          <div class="text-xs text-zinc-500 mt-1 italic" x-text="p.venue ? (p.venue.full_name || p.venue.name) + (p.venue.edition ? ' · ' + p.venue.edition : '') : ''"></div>
                        </div>
                        <div class="shrink-0 flex flex-col items-end gap-1.5">
                          <span class="text-[10px] uppercase tracking-wider font-medium text-zinc-400 bg-zinc-800/60 px-1.5 py-0.5 rounded" x-text="pubTypeName(p.type)"></span>
                          <template x-if="p.venue?.society">
                            <span class="text-[10px] uppercase tracking-wider font-medium text-zinc-500" x-text="p.venue.society"></span>
                          </template>
                        </div>
                      </div>
                    </li>
                  </template>
                </ul>
              </section>
            </template>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================== SERVICES VIEW ============================== -->
    <section x-show="view==='services' && !error">
      <div class="grid grid-cols-1 md:grid-cols-[260px_1fr] gap-6">
        <aside class="space-y-6">
          <section>
            <h3 class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2" x-text="t('filter_member')"></h3>
            <div class="space-y-1 max-h-60 overflow-y-auto pr-1">
              <template x-for="m in data.members" :key="m.id">
                <label class="flex items-center gap-2 text-sm cursor-pointer" x-show="data.counts.by_member[m.id]?.services">
                  <input type="checkbox" :value="m.id" x-model="filters.authors" class="accent-accent-500">
                  <span class="grow truncate" x-text="m.name"></span>
                  <span class="text-xs font-mono text-zinc-600" x-text="data.counts.by_member[m.id]?.services || 0"></span>
                </label>
              </template>
            </div>
          </section>
          <button @click="resetFilters()" class="text-xs text-zinc-500 hover:text-zinc-200 transition" x-text="t('clear_filters')"></button>
        </aside>

        <div class="min-w-0">
          <div class="mb-3 text-xs text-zinc-500">
            <span class="text-zinc-300 font-mono" x-text="filteredServices.length"></span> /
            <span class="font-mono" x-text="data.services.length"></span>
            <span x-text="t('services')"></span>
          </div>

          <div x-show="!data.services.length" class="border border-zinc-800 rounded-lg p-12 text-center text-zinc-500">
            <p x-text="t('no_svc_yet')"></p>
          </div>

          <ul class="space-y-2">
            <template x-for="s in filteredServices" :key="s.id">
              <li class="bg-zinc-900/30 border border-zinc-800/80 rounded-lg p-4">
                <div class="flex items-start justify-between gap-4">
                  <div class="min-w-0">
                    <h3 class="font-medium text-zinc-100 leading-snug" x-text="s.title"></h3>
                    <div class="text-xs text-zinc-400 mt-1">
                      <span x-text="serviceRoleName(s.role)"></span>
                      · <span x-text="memberName(s.member_id)"></span>
                    </div>
                    <template x-if="s.related_work?.candidate_name">
                      <div class="text-xs text-zinc-500 mt-1" x-text="s.related_work.candidate_name + (s.related_work.title ? ' — ' + s.related_work.title : '')"></div>
                    </template>
                  </div>
                  <div class="shrink-0 text-xs text-zinc-500 font-mono" x-text="s.year || (s.year_start ? (s.year_start + (s.year_end && s.year_end !== s.year_start ? '–'+s.year_end : '')) : '')"></div>
                </div>
              </li>
            </template>
          </ul>
        </div>
      </div>
    </section>

  </main>

  <!-- ============================== MEMBER DRAWER ============================== -->
  <div x-show="selectedMember" x-transition.opacity @keydown.escape.window="selectedMember = null"
       class="fixed inset-0 z-40 bg-zinc-950/80 backdrop-blur-sm grid place-items-start justify-end p-0 sm:p-4" @click.self="selectedMember = null">
    <article x-show="selectedMember" x-transition
             class="bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl w-full max-w-3xl max-h-screen sm:max-h-[95vh] overflow-y-auto" @click.stop>
      <template x-if="selectedMember">
        <div>
          <header class="px-6 pt-6 pb-4 border-b border-zinc-800 flex items-start gap-4">
            <div class="w-20 h-20 rounded-full bg-zinc-800 ring-2 ring-zinc-700 shrink-0 overflow-hidden grid place-items-center">
              <template x-if="selectedMember.photo_url">
                <img :src="selectedMember.photo_url" :alt="selectedMember.name" class="w-full h-full object-cover" onerror="this.style.display='none'">
              </template>
              <template x-if="!selectedMember.photo_url">
                <span class="font-mono text-2xl text-zinc-500" x-text="selectedMember.name.split(' ').map(s=>s[0]).slice(0,2).join('')"></span>
              </template>
            </div>
            <div class="grow min-w-0">
              <h2 class="text-xl font-semibold tracking-tight" x-text="selectedMember.full_name || selectedMember.name"></h2>
              <div class="text-[11px] uppercase tracking-wider text-zinc-500 mt-1" x-text="t('role_'+selectedMember.role) + ' · ' + selectedMember.affiliation"></div>
              <p class="text-sm text-zinc-300 mt-2 leading-relaxed" x-text="selectedMember['bio_'+lang] || selectedMember.bio_en || selectedMember.bio_pt"></p>
              <div class="flex flex-wrap items-center gap-2 mt-3">
                <template x-if="selectedMember.profiles?.scholar_url">
                  <a :href="selectedMember.profiles.scholar_url" target="_blank" rel="noopener" class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition">Google Scholar ↗</a>
                </template>
                <template x-if="selectedMember.profiles?.lattes_url">
                  <a :href="selectedMember.profiles.lattes_url" target="_blank" rel="noopener" class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition">Lattes ↗</a>
                </template>
                <template x-if="selectedMember.profiles?.orcid">
                  <a :href="'https://orcid.org/'+selectedMember.profiles.orcid" target="_blank" rel="noopener" class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition">ORCID ↗</a>
                </template>
                <template x-if="selectedMember.profiles?.dblp_url">
                  <a :href="selectedMember.profiles.dblp_url" target="_blank" rel="noopener" class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition">DBLP ↗</a>
                </template>
                <template x-if="selectedMember.profiles?.github">
                  <a :href="selectedMember.profiles.github" target="_blank" rel="noopener" class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition">GitHub ↗</a>
                </template>
                <template x-if="selectedMember.profiles?.linkedin">
                  <a :href="selectedMember.profiles.linkedin" target="_blank" rel="noopener" class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition">LinkedIn ↗</a>
                </template>
              </div>
            </div>
            <button @click="selectedMember = null" class="shrink-0 text-zinc-500 hover:text-zinc-100 transition" aria-label="Close">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 5l10 10M15 5l-10 10"/></svg>
            </button>
          </header>

          <nav class="px-6 pt-3 flex items-center gap-1 border-b border-zinc-800">
            <button @click="memberTab='pubs'" :class="memberTab==='pubs' ? 'border-accent-500 text-zinc-100' : 'border-transparent text-zinc-500 hover:text-zinc-300'" class="text-sm px-3 py-2 border-b-2 font-medium transition">
              <span x-text="t('nav_publications')"></span>
              <span class="ml-1 text-xs font-mono text-zinc-500" x-text="memberPubs(selectedMember.id).length"></span>
            </button>
            <button @click="memberTab='svc'" :class="memberTab==='svc' ? 'border-accent-500 text-zinc-100' : 'border-transparent text-zinc-500 hover:text-zinc-300'" class="text-sm px-3 py-2 border-b-2 font-medium transition">
              <span x-text="t('nav_services')"></span>
              <span class="ml-1 text-xs font-mono text-zinc-500" x-text="memberSvcs(selectedMember.id).length"></span>
            </button>
          </nav>

          <section class="px-6 py-4">
            <template x-if="memberTab==='pubs'">
              <div>
                <template x-if="!memberPubs(selectedMember.id).length">
                  <div class="text-sm text-zinc-500 py-8 text-center">
                    <p x-text="selectedMember.last_research_date ? t('no_records') : t('never_researched')"></p>
                    <p class="mt-2 text-xs" x-text="t('hint_refresh_member')"></p>
                  </div>
                </template>
                <div class="space-y-4">
                  <template x-for="g in memberPubsByYear(selectedMember.id)" :key="g.year">
                    <div>
                      <h4 class="text-xs font-mono text-zinc-500 mb-1.5" x-text="g.year"></h4>
                      <ul class="space-y-1.5">
                        <template x-for="p in g.items" :key="p.id">
                          <li class="text-sm">
                            <button @click="selectedPub = p; selectedMember = null" class="text-left w-full hover:text-accent-400 transition">
                              <span class="text-zinc-200" x-text="p['title_'+lang] || p.title"></span>
                              <span class="text-zinc-500 italic" x-text="p.venue ? ' · ' + (p.venue.short_name || p.venue.name) : ''"></span>
                              <span class="text-[10px] uppercase tracking-wider font-medium text-zinc-500 ml-1" x-text="pubTypeName(p.type)"></span>
                            </button>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <template x-if="memberTab==='svc'">
              <div>
                <template x-if="!memberSvcs(selectedMember.id).length">
                  <div class="text-sm text-zinc-500 py-8 text-center" x-text="t('no_records')"></div>
                </template>
                <ul class="space-y-2">
                  <template x-for="s in memberSvcs(selectedMember.id)" :key="s.id">
                    <li class="text-sm">
                      <div class="text-zinc-200" x-text="s.title"></div>
                      <div class="text-xs text-zinc-500" x-text="serviceRoleName(s.role) + (s.year ? ' · ' + s.year : '')"></div>
                    </li>
                  </template>
                </ul>
              </div>
            </template>
          </section>

          <footer class="px-6 py-3 border-t border-zinc-800 bg-zinc-950/40 text-[11px] text-zinc-500 flex items-center justify-between">
            <span>
              <span x-text="t('last_researched')"></span>
              <span class="font-mono" x-text="selectedMember.last_research_date || t('never')"></span>
            </span>
            <a :href="'https://github.com/muanlartins/labnet-publications/blob/main/data/members/' + selectedMember.id + '.yaml'" target="_blank" rel="noopener" class="hover:text-zinc-300 transition">edit on GitHub →</a>
          </footer>
        </div>
      </template>
    </article>
  </div>

  <!-- ============================== PUBLICATION DRAWER ============================== -->
  <div x-show="selectedPub" x-transition.opacity @keydown.escape.window="selectedPub = null"
       class="fixed inset-0 z-50 bg-zinc-950/80 backdrop-blur-sm grid place-items-center p-4 sm:p-8" @click.self="selectedPub = null">
    <article x-show="selectedPub" x-transition
             class="bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" @click.stop>
      <template x-if="selectedPub">
        <div>
          <header class="px-6 pt-6 pb-4 border-b border-zinc-800 flex items-start justify-between gap-4">
            <div class="min-w-0">
              <h2 class="text-lg font-semibold tracking-tight leading-snug" x-text="selectedPub['title_'+lang] || selectedPub.title"></h2>
              <div class="flex flex-wrap gap-1.5 mt-3 items-center">
                <span class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded font-medium bg-accent-500/15 text-accent-300 ring-1 ring-accent-500/30" x-text="pubTypeName(selectedPub.type)"></span>
                <span class="text-xs font-mono text-zinc-400" x-text="selectedPub.year"></span>
                <template x-if="selectedPub.venue?.society">
                  <span class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-zinc-800/60 text-zinc-400" x-text="selectedPub.venue.society"></span>
                </template>
              </div>
            </div>
            <button @click="selectedPub = null" class="shrink-0 text-zinc-500 hover:text-zinc-100 transition" aria-label="Close">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 5l10 10M15 5l-10 10"/></svg>
            </button>
          </header>
          <section class="px-6 py-4 space-y-4 text-sm">
            <div>
              <div class="text-[11px] uppercase tracking-wider text-zinc-500 mb-1" x-text="t('authors')"></div>
              <ol class="text-zinc-200 space-y-0.5">
                <template x-for="a in selectedPub.authors" :key="a.position">
                  <li>
                    <span class="font-mono text-[11px] text-zinc-500 mr-2" x-text="a.position + '.'"></span>
                    <template x-if="a.member_id">
                      <button @click="selectedMember = data.members.find(m => m.id === a.member_id); selectedPub = null" class="text-accent-400 hover:underline" x-text="a.name"></button>
                    </template>
                    <template x-if="!a.member_id">
                      <span x-text="a.name"></span>
                    </template>
                    <template x-if="a.is_corresponding">
                      <span class="text-[10px] uppercase tracking-wider text-zinc-500 ml-1">(corresp.)</span>
                    </template>
                  </li>
                </template>
              </ol>
            </div>
            <template x-if="selectedPub.venue">
              <div>
                <div class="text-[11px] uppercase tracking-wider text-zinc-500" x-text="t('venue')"></div>
                <div class="text-zinc-200" x-text="selectedPub.venue.full_name || selectedPub.venue.name"></div>
                <div class="text-xs text-zinc-500" x-text="[selectedPub.venue.edition, selectedPub.location?.city, selectedPub.location?.country].filter(Boolean).join(' · ')"></div>
              </div>
            </template>
            <template x-if="selectedPub.abstract">
              <div>
                <div class="text-[11px] uppercase tracking-wider text-zinc-500" x-text="t('abstract')"></div>
                <p class="text-zinc-300 leading-relaxed text-xs" x-text="selectedPub.abstract"></p>
              </div>
            </template>
            <template x-if="selectedPub.identifiers && Object.keys(selectedPub.identifiers).length">
              <div>
                <div class="text-[11px] uppercase tracking-wider text-zinc-500" x-text="t('identifiers')"></div>
                <div class="text-xs font-mono text-zinc-300 space-y-0.5">
                  <template x-for="[k,v] in Object.entries(selectedPub.identifiers)" :key="k">
                    <div>
                      <span class="text-zinc-500 uppercase" x-text="k"></span>:
                      <template x-if="identifierLink(k,v)"><a :href="identifierLink(k,v)" target="_blank" rel="noopener" class="text-accent-300 hover:text-accent-200 underline decoration-accent-500/30 underline-offset-2" x-text="v"></a></template>
                      <template x-if="!identifierLink(k,v)"><span x-text="v"></span></template>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <div class="text-[11px] text-zinc-600 pt-2 border-t border-zinc-800 flex items-center justify-between gap-2">
              <span>
                <span x-text="t('last_verified')"></span>
                <span class="font-mono" x-text="selectedPub.last_verified"></span>
                · <span x-text="selectedPub.verified_by || 'unknown'"></span>
              </span>
              <a :href="'https://github.com/muanlartins/labnet-publications/blob/main/data/publications/' + selectedPub.id + '.yaml'" target="_blank" rel="noopener" class="hover:text-zinc-300 transition">edit on GitHub →</a>
            </div>
          </section>
          <footer class="px-6 py-3 border-t border-zinc-800 bg-zinc-950/40 flex items-center justify-end gap-2">
            <template x-if="selectedPub.pdf_url">
              <a :href="selectedPub.pdf_url" target="_blank" rel="noopener" class="text-xs px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700 text-zinc-200 transition">PDF ↗</a>
            </template>
            <template x-if="selectedPub.url">
              <a :href="selectedPub.url" target="_blank" rel="noopener" class="text-xs px-3 py-1.5 rounded bg-accent-500/20 hover:bg-accent-500/30 text-accent-300 ring-1 ring-accent-500/40 transition" x-text="t('open_source')"></a>
            </template>
          </footer>
        </div>
      </template>
    </article>
  </div>

  <footer class="border-t border-zinc-800/80 mt-12">
    <div class="max-w-[1600px] mx-auto px-6 py-6 text-xs text-zinc-500 flex flex-wrap items-center justify-between gap-4">
      <div x-text="t('footer_built_by')"></div>
      <div class="flex items-center gap-4">
        <a href="https://github.com/muanlartins/labnet-publications" class="hover:text-zinc-200 transition">GitHub</a>
        <a href="https://muanlartins.github.io/labnet-calendar" class="hover:text-zinc-200 transition" x-text="t('footer_calendar')"></a>
        <a href="https://labnet.nce.ufrj.br/" class="hover:text-zinc-200 transition">LabNet</a>
      </div>
    </div>
  </footer>

</body>
</html>
