  - { id: guest_editor,            name_en: Guest Editor,            name_pt: Editor Convidado }
  - { id: associate_editor,        name_en: Associate Editor,        name_pt: Editor Associado }
  - { id: reviewer_journal,        name_en: Journal Reviewer,        name_pt: Revisor de Periódico }
  - { id: reviewer_conference,     name_en: Conference Reviewer,     name_pt: Revisor de Conferência }
  - { id: thesis_jury,             name_en: PhD Thesis Jury,         name_pt: Banca de Doutorado }
  - { id: dissertation_jury,       name_en: Master's Jury,           name_pt: Banca de Mestrado }
