  - { id: tcc_jury,                name_en: Undergrad Jury,          name_pt: Banca de TCC }
  - { id: advising_phd,            name_en: PhD Advising,            name_pt: Orientação de Doutorado }
  - { id: advising_masters,        name_en: Master's Advising,       name_pt: Orientação de Mestrado }
