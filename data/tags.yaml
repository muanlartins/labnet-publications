# ---------------------------------------------------------------------------
# Source registry — where the refresh skill pulls data from. Ordered by trust.
# ---------------------------------------------------------------------------
sources:
  - { id: openalex,      name: OpenAlex,         base_url: "https://api.openalex.org/" }
  - { id: dblp,          name: DBLP,             base_url: "https://dblp.org/" }
  - { id: sbc_sol,       name: "SBC SOL",        base_url: "https://sol.sbc.org.br/" }
  - { id: orcid,         name: ORCID,            base_url: "https://pub.orcid.org/v3.0/" }
  - { id: scholar,       name: "Google Scholar", base_url: "https://scholar.google.com/" }
  - { id: lattes,        name: Lattes,           base_url: "http://lattes.cnpq.br/" }
  - { id: doi,           name: "Crossref / DOI", base_url: "https://api.crossref.org/" }
  - { id: semantic_scholar, name: "Semantic Scholar", base_url: "https://api.semanticscholar.org/" }
  - { id: manual,        name: "Manual entry",   base_url: null }
