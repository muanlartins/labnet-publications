  - { id: coadvising_masters,      name_en: Master's Co-Advising,    name_pt: Co-orientação de Mestrado }
  - { id: invited_talk,            name_en: Invited Talk,            name_pt: Palestra Convidada }
  - { id: keynote,                 name_en: Keynote,                 name_pt: Palestra Magna }
  - { id: tutorial,                name_en: Tutorial,                name_pt: Tutorial }
  - { id: panel,                   name_en: Panel,                   name_pt: Mesa Redonda }
  - { id: session_chair,           name_en: Session Chair,           name_pt: Presidente de Sessão }
