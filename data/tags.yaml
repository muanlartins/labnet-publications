# Controlled vocabularies. The validator rejects values not in these lists.
# Adding a value is a deliberate, human-reviewable change.

# ---------------------------------------------------------------------------
# Research areas — applied to members (their interests) and publications.
# Keep this list tight: broad-enough that every publication fits, narrow-enough
# that the filter pane stays usable.
# ---------------------------------------------------------------------------
areas:
  - { id: networking,    name_en: Networking,             name_pt: Redes }
  - { id: iot,           name_en: Internet of Things,     name_pt: Internet das Coisas }
  - { id: distributed,   name_en: Distributed Systems,    name_pt: Sistemas Distribuídos }
  - { id: embedded,      name_en: Embedded Systems,       name_pt: Sistemas Embarcados }
  - { id: security,      name_en: Security & Privacy,     name_pt: Segurança e Privacidade }
  - { id: cryptography,  name_en: Cryptography,           name_pt: Criptografia }
  - { id: ml,            name_en: Machine Learning,       name_pt: Aprendizado de Máquina }
  - { id: ai,            name_en: Artificial Intelligence, name_pt: Inteligência Artificial }
  - { id: nlp,           name_en: Natural Language Processing, name_pt: Processamento de Linguagem Natural }
  - { id: cv,            name_en: Computer Vision,        name_pt: Visão Computacional }
  - { id: se,            name_en: Software Engineering,   name_pt: Engenharia de Software }
  - { id: se-testing,    name_en: Software Testing,       name_pt: Teste de Software }
  - { id: se-analytics,  name_en: Software Analytics,     name_pt: Análise de Software }
  - { id: databases,     name_en: Databases,              name_pt: Bancos de Dados }
  - { id: data-mining,   name_en: Data Mining,            name_pt: Mineração de Dados }
  - { id: bigdata,       name_en: Big Data,               name_pt: Big Data }
  - { id: hci,           name_en: Human-Computer Interaction, name_pt: Interação Humano-Computador }
  - { id: theory,        name_en: Theory & Algorithms,    name_pt: Teoria e Algoritmos }
  - { id: performance,   name_en: Performance Analysis,   name_pt: Análise de Desempenho }
  - { id: smart-city,    name_en: Smart Cities,           name_pt: Cidades Inteligentes }
  - { id: energy,        name_en: Energy Systems,         name_pt: Sistemas de Energia }
  - { id: e-health,      name_en: e-Health,               name_pt: Saúde Digital }
  - { id: e-government,  name_en: e-Government,           name_pt: Governo Digital }
  - { id: blockchain,    name_en: Blockchain & DLT,       name_pt: Blockchain }
  - { id: education,     name_en: Computing Education,    name_pt: Educação em Computação }

# ---------------------------------------------------------------------------
# Publication types — the `type` field on a publication must be in this list.
# ---------------------------------------------------------------------------
publication_types:
  - { id: journal_article,    name_en: Journal Article,       name_pt: Artigo em Periódico }
  - { id: magazine_article,   name_en: Magazine Article,      name_pt: Artigo em Revista }
  - { id: conference_paper,   name_en: Conference Paper,      name_pt: Artigo em Conferência }
  - { id: workshop_paper,     name_en: Workshop Paper,        name_pt: Artigo em Workshop }
  - { id: symposium_paper,    name_en: Symposium Paper,       name_pt: Artigo em Simpósio }
  - { id: book,               name_en: Book,                  name_pt: Livro }
  - { id: book_chapter,       name_en: Book Chapter,          name_pt: Capítulo de Livro }
  - { id: edited_book,        name_en: Edited Book,           name_pt: Livro Organizado }
  - { id: thesis,             name_en: PhD Thesis,            name_pt: Tese de Doutorado }
  - { id: dissertation,       name_en: Master's Dissertation, name_pt: Dissertação de Mestrado }
  - { id: tcc,                name_en: Undergraduate Thesis,  name_pt: Trabalho de Conclusão de Curso }
  - { id: technical_report,   name_en: Technical Report,      name_pt: Relatório Técnico }
  - { id: preprint,           name_en: Preprint,              name_pt: Preprint }
  - { id: abstract,           name_en: Abstract,              name_pt: Resumo }
  - { id: extended_abstract,  name_en: Extended Abstract,     name_pt: Resumo Estendido }
  - { id: poster,             name_en: Poster,                name_pt: Pôster }
  - { id: editorial,          name_en: Editorial,             name_pt: Editorial }
  - { id: review,             name_en: Review Article,        name_pt: Artigo de Revisão }
  - { id: patent,             name_en: Patent,                name_pt: Patente }
  - { id: dataset,            name_en: Dataset,               name_pt: Conjunto de Dados }
  - { id: software,           name_en: Software Artifact,     name_pt: Software }

# ---------------------------------------------------------------------------
# Service roles — the `role` field on a service record must be in this list.
