bio_en: "PhD student in Systems and Computer Engineering at PESC/COPPE/UFRJ (advisor: Claudio Miceli). Master's in Informatics from PPGI/NCE/UFRJ (2022) with a dissertation on secure processing of smart-meter data (advisor: Luiz Fernando Rust, co-advisor: Claudio Miceli). Previously collaborated with Inmetro on the EU H2020 SecureCloud project (2016–2018). Current industry role at Neopath Integrated Systems (UFRJ Technology Park). Research focus: information security, secure cloud computing, smart-grid security, and IoT."
bio_pt: "Doutorando em Engenharia de Sistemas e Computação no PESC/COPPE/UFRJ (orientador: Claudio Miceli). Mestre em Informática pelo PPGI/NCE/UFRJ (2022), com dissertação sobre processamento seguro de dados de smart meters (orientador: Luiz Fernando Rust, coorientador: Claudio Miceli). Colaborou com o Inmetro no projeto EU H2020 SecureCloud (2016–2018). Atualmente na Neopath Integrated Systems (Parque Tecnológico da UFRJ). Foco de pesquisa: segurança da informação, nuvem segura, segurança em smart grids e IoT."
