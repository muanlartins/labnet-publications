name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run all

      - name: Cache-bust asset URLs with commit SHA
        run: |
          SHA=${GITHUB_SHA:0:7}
          sed -i \
            -e "s|assets/app\.js\"|assets/app.js?v=${SHA}\"|g" \
            -e "s|assets/style\.css\"|assets/style.css?v=${SHA}\"|g" \
            -e "s|data/site\.json\"|data/site.json?v=${SHA}\"|g" \
            web/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
